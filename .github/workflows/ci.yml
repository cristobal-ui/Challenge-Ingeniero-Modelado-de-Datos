name: CI

# Valida que la solución (proyecto dbt) corra de extremo a extremo:
# construye los modelos desde los CSV crudos y ejecuta todos los tests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt-build:
    name: Proyecto dbt (dbt-duckdb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dbt-duckdb
        run: pip install -r requirements.txt
      - name: dbt build (modelos + tests)
        working-directory: dbt
        run: dbt build --profiles-dir .
